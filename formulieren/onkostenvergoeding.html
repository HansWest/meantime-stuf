<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onkostenvergoeding - Meantime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d12;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-primary: #10b981;
            --accent-secondary: #059669;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --input-bg: rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 1.5rem;
            background-image: radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; }
        input, textarea {
            width: 100%; padding: 1rem; background: var(--input-bg); border: 1px solid var(--input-border);
            border-radius: 12px; color: var(--text-main); font-size: 1rem;
        }
        .submit-btn {
            width: 100%; padding: 1rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer;
        }
        .back-link { display: block; margin-top: 1.5rem; text-align: center; color: var(--text-muted); text-decoration: none; font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Onkosten indienen</h1>
        <p class="subtitle">Vul de gegevens in. Het formulier opent daarna je email-app met conceptmail.</p>
        <form id="expenseForm">
            <div class="form-group">
                <label for="name">Naam vrijwilliger</label>
                <input type="text" id="name" placeholder="Jouw volledige naam" required>
            </div>
            <div class="form-group">
                <label for="iban">IBAN</label>
                <input type="text" id="iban" placeholder="NL00 BANK 0000 0000 00" required>
            </div>
            <div class="form-group">
                <label for="amount">Totaalbedrag (€)</label>
                <input type="number" id="amount" step="0.01" min="0" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label for="description">Omschrijving</label>
                <textarea id="description" rows="3" placeholder="Wat heb je gekocht?" required></textarea>
            </div>
            <div class="form-group">
                <label for="receipt">Bonnetje (foto/scan)</label>
                <input type="file" id="receipt" accept="image/*,application/pdf" required>
            </div>
            <button type="submit" class="submit-btn">Verstuur via Email ➡️</button>
        </form>
        <a href="../index.html" class="back-link">← Terug naar dashboard</a>
    </div>

    <script>
        document.getElementById('expenseForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const iban = document.getElementById('iban').value.trim();
            const amount = document.getElementById('amount').value;
            const description = document.getElementById('description').value.trim();
            const receiptInput = document.getElementById('receipt');
            const receiptFile = receiptInput.files && receiptInput.files[0] ? receiptInput.files[0].name : '';

            const recipient = 'hnswest@gmail.com';
            const subject = `[ONKOSTEN] ${name} - €${amount}`;

            let body = `# Onkostenvergoeding\n\n`;
            body += `## Gegevens vrijwilliger\n`;
            body += `- **Naam:** ${name}\n`;
            body += `- **IBAN:** ${iban}\n`;
            body += `- **Datum indiening:** ${new Date().toLocaleString('nl-NL')}\n\n`;
            body += `## Uitgaven\n`;
            body += `- **Totaalbedrag:** €${amount}\n`;
            body += `- **Omschrijving:** ${description}\n\n`;
            body += `## Bijlage\n`;
            body += `- **Bonnetje bestand:** ${receiptFile || 'Niet gekozen'}\n`;
            body += `- Voeg dit bestand handmatig toe als bijlage in je mail-app.\n\n`;
            body += `---\n*Gegenereerd via Meantime Onkostenformulier*`;

            const mailtoLink = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            window.location.href = mailtoLink;
        });
    </script>
</body>
</html>
